# Training Hyperparameters Configuration

# General Training Parameters
training:
  total_timesteps: 1000000
  eval_frequency: 10000
  save_frequency: 50000
  log_frequency: 1000
  
# Environment Parameters
environment:
  num_envs: 1
  max_episode_steps: 1000
  render_mode: "rgb_array"
  
# Agent Parameters
agent:
  batch_size: 64
  learning_rate: 1e-4
  gamma: 0.99
  epsilon_start: 1.0
  epsilon_end: 0.01
  epsilon_decay: 0.995
  
# DQN Specific Parameters
dqn:
  target_update_frequency: 1000
  replay_buffer_size: 100000
  double_dqn: true
  dueling_dqn: true
  
# Policy Gradient Specific Parameters
policy_gradient:
  n_steps: 2048
  n_epochs: 10
  mini_batch_size: 64
  gae_lambda: 0.95
  clip_range: 0.2
  
# Logging Parameters
logging:
  log_dir: "data/logs"
  tensorboard: true
  wandb: false
  project_name: "robotic_grasping"
  
# Checkpointing Parameters
checkpointing:
  save_dir: "data/checkpoints"
  save_best: true
  save_frequency: 10000

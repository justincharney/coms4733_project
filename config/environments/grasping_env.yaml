# Grasping Environment Configuration

environment:
  name: "GraspingEnvironment"
  model_path: "models/robot_arm.xml"
  
  # Simulation settings
  timestep: 0.002
  max_episode_steps: 1000
  
  # Observation space
  observation:
    type: "state"  # Options: "state", "image", "mixed"
    include_joint_positions: true
    include_joint_velocities: true
    include_end_effector_pose: true
    include_object_pose: true
    include_contact_forces: true
    
  # Action space
  action:
    type: "discrete"  # Options: "discrete", "continuous"
    num_actions: 8  # For discrete: 8 directions + gripper
    action_scale: 0.1  # For continuous actions
    
  # Reward function
  reward:
    success_reward: 100.0
    failure_penalty: -10.0
    step_penalty: -0.1
    distance_reward_weight: 1.0
    contact_reward_weight: 0.5
    stability_reward_weight: 0.2
    
  # Object settings
  objects:
    types: ["cube", "cylinder", "sphere"]
    spawn_range:
      x: [0.2, 0.4]
      y: [-0.2, 0.2]
      z: [0.05, 0.15]
    masses: [0.1, 0.2, 0.3]
    
  # Gripper settings
  gripper:
    max_force: 10.0
    close_threshold: 0.02
    grasp_threshold: 0.01
